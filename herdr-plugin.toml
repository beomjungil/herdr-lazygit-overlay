id = "beomjungil.lazygit-overlay"
name = "Lazygit Overlay"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Open lazygit as a temporary Herdr overlay over the active pane."
platforms = ["macos", "linux"]

[[panes]]
id = "lazygit"
title = "Lazygit"
placement = "overlay"
command = ["lazygit"]

[[actions]]
id = "open"
title = "Open Lazygit Overlay"
description = "Open lazygit as an overlay over the active pane."
contexts = ["workspace", "tab", "pane"]
command = ["bash", "scripts/open.sh"]
